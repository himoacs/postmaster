name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: pnpm build
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'build-time-placeholder-key-32bytes!' }}

      - name: Prepare standalone build
        run: pnpm electron:prepare

      - name: Rebuild native modules for Electron
        run: pnpm electron:rebuild-standalone

      - name: Prepare Electron dependencies
        run: pnpm electron:deps

      - name: Compile Electron
        run: pnpm electron:compile

      - name: Build Mac app
        run: pnpm exec electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: pnpm build
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'build-time-placeholder-key-32bytes!' }}

      - name: Prepare standalone build
        run: |
          if (Test-Path .next/standalone_flat) { Remove-Item -Recurse -Force .next/standalone_flat }
          Copy-Item -Recurse -Force .next/standalone .next/standalone_flat
          node scripts/fix-standalone.js
        shell: pwsh

      - name: Rebuild native modules for Electron
        run: node scripts/rebuild-standalone-native.js

      - name: Prepare Electron dependencies
        run: node scripts/prepare-electron-deps.js

      - name: Compile Electron
        run: pnpm electron:compile

      - name: Build Windows app
        run: pnpm exec electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            dist/*.exe
          retention-days: 5

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-builds
          path: dist/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Update landing page with new version and deploy to GitHub Pages
  # This is the ONLY landing page deployment workflow
  # Source: docs/ folder (single source of truth)
  deploy-landing:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Updating landing page to version: $VERSION"

      - name: Update landing page download links
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Update all download links in docs/index.html
          sed -i "s|/releases/download/v[0-9.]*-*[a-zA-Z0-9]*/PostMaster-[0-9.]*-*[a-zA-Z0-9]*-arm64.dmg|/releases/download/v${VERSION}/PostMaster-${VERSION}-arm64.dmg|g" docs/index.html
          sed -i "s|/releases/download/v[0-9.]*-*[a-zA-Z0-9]*/PostMaster-[0-9.]*-*[a-zA-Z0-9]*.dmg|/releases/download/v${VERSION}/PostMaster-${VERSION}.dmg|g" docs/index.html
          
          # Update version text (e.g., "v1.2.2 •" to "v1.2.3 •")
          sed -i "s|>v[0-9.]*-*[a-zA-Z0-9]* •|>v${VERSION} •|g" docs/index.html
          
          echo "Updated docs/index.html with version ${VERSION}"
          grep -n "PostMaster-.*\.dmg" docs/index.html || true

      - name: Commit updated landing page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Update landing page to v${{ steps.version.outputs.version }}"
          git push origin main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          cname: postmaster.app # Optional: custom domain
