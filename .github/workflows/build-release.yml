name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ============================================================================
  # macOS ARM64 (Apple Silicon) Build
  # ============================================================================
  build-mac-arm64:
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Rebuild better-sqlite3 for Node.js (needed for Next.js build)
        run: |
          cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3
          npm rebuild
          cd ${{ github.workspace }}

      - name: Build Next.js
        run: pnpm build
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'build-time-placeholder-key-32bytes!' }}

      - name: Prepare standalone build
        run: pnpm electron:prepare

      - name: Rebuild native modules for Electron
        run: pnpm electron:rebuild-standalone

      - name: Verify native modules
        run: |
          echo "Verifying native module integrity..."
          node -e "
            const fs = require('fs');
            const path = require('path');
            
            // Check main location
            const mainPath = '.next/standalone_flat/node_modules/better-sqlite3/build/Release/better_sqlite3.node';
            if (!fs.existsSync(mainPath)) {
              console.error('ERROR: Native module not found at', mainPath);
              process.exit(1);
            }
            const mainSize = fs.statSync(mainPath).size;
            console.log('Main location:', mainPath);
            console.log('  Size:', (mainSize / 1024 / 1024).toFixed(2), 'MB');
            
            // Check traced location
            const tracedDirs = fs.readdirSync('.next/standalone_flat/.next/node_modules')
              .filter(d => d.startsWith('better-sqlite3-'));
            if (tracedDirs.length === 0) {
              console.error('ERROR: No traced better-sqlite3 directory found');
              process.exit(1);
            }
            const tracedPath = path.join('.next/standalone_flat/.next/node_modules', tracedDirs[0], 'build/Release/better_sqlite3.node');
            if (!fs.existsSync(tracedPath)) {
              console.error('ERROR: Native module not found at traced location', tracedPath);
              process.exit(1);
            }
            const tracedSize = fs.statSync(tracedPath).size;
            console.log('Traced location:', tracedPath);
            console.log('  Size:', (tracedSize / 1024 / 1024).toFixed(2), 'MB');
            
            // Verify sizes match
            if (mainSize !== tracedSize) {
              console.error('ERROR: Native module sizes do not match!');
              console.error('  Main:', mainSize, 'Traced:', tracedSize);
              process.exit(1);
            }
            
            // Verify size is correct for Electron (should be ~1.9MB, not ~1.3MB for Node.js)
            const MIN_SIZE = 1500000; // 1.5MB minimum for Electron build
            if (mainSize < MIN_SIZE) {
              console.error('ERROR: Native module too small (' + (mainSize/1024/1024).toFixed(2) + 'MB)');
              console.error('  This suggests it was built for Node.js, not Electron');
              console.error('  Expected: >1.5MB for Electron build');
              process.exit(1);
            }
            
            console.log('✓ Native modules verified successfully');
          "

      - name: Prepare Electron dependencies
        run: pnpm electron:deps

      - name: Compile Electron
        run: pnpm electron:compile

      - name: Build Mac ARM64 app
        run: |
          # Check if signing secrets are available
          if [ -z "$CSC_LINK" ]; then
            echo "No code signing certificate found, building unsigned"
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          # Check if notarization secrets are available
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "No notarization credentials found, skipping notarization"
            pnpm exec electron-builder --mac --arm64 --config.mac.notarize=false
          else
            pnpm exec electron-builder --mac --arm64
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Upload Mac ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64-builds
          path: |
            dist/*-arm64.dmg
            dist/*-arm64.zip
            dist/*-arm64-mac.zip
            dist/*.yml
            dist/*.blockmap
          retention-days: 5

  # ============================================================================
  # macOS x64 (Intel) Build
  # ============================================================================
  build-mac-x64:
    runs-on: macos-13  # Intel runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Rebuild better-sqlite3 for Node.js (needed for Next.js build)
        run: |
          cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3
          npm rebuild
          cd ${{ github.workspace }}

      - name: Build Next.js
        run: pnpm build
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'build-time-placeholder-key-32bytes!' }}

      - name: Prepare standalone build
        run: pnpm electron:prepare

      - name: Rebuild native modules for Electron
        run: pnpm electron:rebuild-standalone

      - name: Verify native modules
        run: |
          echo "Verifying native module integrity..."
          node -e "
            const fs = require('fs');
            const path = require('path');
            
            // Check main location
            const mainPath = '.next/standalone_flat/node_modules/better-sqlite3/build/Release/better_sqlite3.node';
            if (!fs.existsSync(mainPath)) {
              console.error('ERROR: Native module not found at', mainPath);
              process.exit(1);
            }
            const mainSize = fs.statSync(mainPath).size;
            console.log('Main location:', mainPath);
            console.log('  Size:', (mainSize / 1024 / 1024).toFixed(2), 'MB');
            
            // Check traced location
            const tracedDirs = fs.readdirSync('.next/standalone_flat/.next/node_modules')
              .filter(d => d.startsWith('better-sqlite3-'));
            if (tracedDirs.length === 0) {
              console.error('ERROR: No traced better-sqlite3 directory found');
              process.exit(1);
            }
            const tracedPath = path.join('.next/standalone_flat/.next/node_modules', tracedDirs[0], 'build/Release/better_sqlite3.node');
            if (!fs.existsSync(tracedPath)) {
              console.error('ERROR: Native module not found at traced location', tracedPath);
              process.exit(1);
            }
            const tracedSize = fs.statSync(tracedPath).size;
            console.log('Traced location:', tracedPath);
            console.log('  Size:', (tracedSize / 1024 / 1024).toFixed(2), 'MB');
            
            // Verify sizes match
            if (mainSize !== tracedSize) {
              console.error('ERROR: Native module sizes do not match!');
              console.error('  Main:', mainSize, 'Traced:', tracedSize);
              process.exit(1);
            }
            
            // Verify size is correct for Electron (should be ~1.9MB, not ~1.3MB for Node.js)
            const MIN_SIZE = 1500000; // 1.5MB minimum for Electron build
            if (mainSize < MIN_SIZE) {
              console.error('ERROR: Native module too small (' + (mainSize/1024/1024).toFixed(2) + 'MB)');
              console.error('  This suggests it was built for Node.js, not Electron');
              console.error('  Expected: >1.5MB for Electron build');
              process.exit(1);
            }
            
            console.log('✓ Native modules verified successfully');
          "

      - name: Prepare Electron dependencies
        run: pnpm electron:deps

      - name: Compile Electron
        run: pnpm electron:compile

      - name: Build Mac x64 app
        run: |
          # Check if signing secrets are available
          if [ -z "$CSC_LINK" ]; then
            echo "No code signing certificate found, building unsigned"
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          # Check if notarization secrets are available
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "No notarization credentials found, skipping notarization"
            pnpm exec electron-builder --mac --x64 --config.mac.notarize=false
          else
            pnpm exec electron-builder --mac --x64
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Upload Mac x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64-builds
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies (skip native builds)
        run: pnpm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: pnpm build
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'build-time-placeholder-key-32bytes!' }}

      - name: Prepare standalone build
        run: |
          if (Test-Path .next/standalone_flat) { Remove-Item -Recurse -Force .next/standalone_flat }
          Copy-Item -Recurse -Force .next/standalone .next/standalone_flat
          node scripts/fix-standalone.js
        shell: pwsh

      - name: Rebuild native modules for Electron
        run: node scripts/rebuild-standalone-native.js

      - name: Prepare Electron dependencies
        run: node scripts/prepare-electron-deps.js

      - name: Compile Electron
        run: pnpm electron:compile

      - name: Build Windows app
        run: pnpm exec electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            dist/*.exe
          retention-days: 5

  release:
    needs: [build-mac-arm64, build-mac-x64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-arm64-builds
          path: dist/

      - name: Download Mac x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-x64-builds
          path: dist/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Update landing page with new version and deploy to GitHub Pages
  # This is the ONLY landing page deployment workflow
  # Source: docs/ folder (single source of truth)
  deploy-landing:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Updating landing page to version: $VERSION"

      - name: Update landing page download links
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Update all download links in docs/index.html
          sed -i "s|/releases/download/v[0-9.]*-*[a-zA-Z0-9]*/PostMaster-[0-9.]*-*[a-zA-Z0-9]*-arm64.dmg|/releases/download/v${VERSION}/PostMaster-${VERSION}-arm64.dmg|g" docs/index.html
          sed -i "s|/releases/download/v[0-9.]*-*[a-zA-Z0-9]*/PostMaster-[0-9.]*-*[a-zA-Z0-9]*.dmg|/releases/download/v${VERSION}/PostMaster-${VERSION}.dmg|g" docs/index.html
          sed -i "s|/releases/download/v[0-9.]*-*[a-zA-Z0-9]*/PostMaster-Setup-[0-9.]*-*[a-zA-Z0-9]*.exe|/releases/download/v${VERSION}/PostMaster-Setup-${VERSION}.exe|g" docs/index.html
          
          # Update version text (e.g., "v1.2.2 •" to "v1.2.3 •")
          sed -i "s|>v[0-9.]*-*[a-zA-Z0-9]* •|>v${VERSION} •|g" docs/index.html
          
          echo "Updated docs/index.html with version ${VERSION}"
          grep -n "PostMaster-.*\.\(dmg\|exe\)" docs/index.html || true

      - name: Commit updated landing page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Update landing page to v${{ steps.version.outputs.version }}"
          git push origin main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          cname: postmaster.app # Optional: custom domain
